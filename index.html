<!DOCTYPE html>
<html>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

            <nav> <a href="#">Home</a> <a href="#">Posts</a> <a href="#">About</a> </nav>

    <main class="layout">

            <div id="posts" class="post-grid"></div>

                <button>2</button>
                <button>Next</button>

        <div id="sidebar"></div>

    <footer class="footer">
        © 2026 오승찬 블로그
    </footer>

    <script src="js/main.js"></script>
    <script src="js/sidebar.js"></script>

</body>

</html>
