<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Post</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">
        <div class="header-inner">
            <h1>
                <a href="/" class="logo" style="color: inherit; text-decoration: none;">
                    My Blog
                </a>
            </h1>
            <nav>
                <a href="/">Home</a>
                <a href="/">Posts</a>
                <a href="#">About</a>
            </nav>
        </div>
    </header>

    <main class="container">

        <a class="back" href="/">← 돌아가기</a>

        <article class="post-view">

            <h1 id="post-title"></h1>
            <div class="post-meta" style="border-bottom: 2px solid #eee; padding-bottom: 10px;">
                <span id="post-date"></span>
            </div>

            <div id="content"></div>

        </article>

    </main>

    <script src="js/post.js"></script>

</body>

</html>
